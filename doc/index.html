<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowledge Base Docs</title>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <style>
    :root {
      --bg: #f5f2eb;
      --ink: #201f1b;
      --muted: #6f6a5d;
      --panel: #fffdf7;
      --line: #d7cebd;
      --accent: #116a67;
      --accent-dark: #0b4b49;
      --code-bg: #ede7db;
      --shadow: 0 18px 50px rgba(48, 42, 31, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(17, 106, 103, 0.12), transparent 36%),
        radial-gradient(circle at 85% 12%, rgba(192, 83, 44, 0.16), transparent 28%),
        var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      min-height: 100vh;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 28px 20px;
      border-right: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.82);
      backdrop-filter: blur(14px);
    }

    .brand {
      font-size: 25px;
      line-height: 1.05;
      margin: 0 0 8px;
      color: var(--accent-dark);
    }

    .subtitle {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button.doc-link {
      appearance: none;
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      padding: 10px 12px;
      border-radius: 7px;
      text-align: left;
      font: 600 15px/1.2 Georgia, "Times New Roman", serif;
      cursor: pointer;
    }

    button.doc-link:hover {
      border-color: var(--line);
      background: rgba(17, 106, 103, 0.08);
    }

    button.doc-link.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 10px 22px rgba(17, 106, 103, 0.24);
    }

    main {
      padding: 42px clamp(20px, 5vw, 72px);
    }

    .paper {
      max-width: 960px;
      min-height: calc(100vh - 84px);
      background: rgba(255, 253, 247, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(26px, 4vw, 58px);
    }

    .status {
      color: var(--muted);
      font-size: 15px;
    }

    article { font-size: 18px; line-height: 1.68; }
    article h1 { margin: 0 0 20px; font-size: clamp(34px, 5vw, 56px); line-height: 1.02; color: var(--accent-dark); }
    article h2 { margin: 34px 0 10px; font-size: 25px; color: var(--accent-dark); }
    article h3 { margin: 24px 0 8px; font-size: 20px; }
    article p { margin: 0 0 15px; }
    article ul, article ol { padding-left: 1.35rem; }
    article li { margin: 5px 0; }
    article a { color: var(--accent-dark); }
    article code {
      font-family: Consolas, "Liberation Mono", monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.1em 0.28em;
      border-radius: 4px;
    }
    article pre {
      overflow-x: auto;
      background: #28261f;
      color: #fff7e8;
      padding: 16px;
      border-radius: 7px;
      border: 1px solid rgba(0, 0, 0, 0.16);
    }
    article pre code { background: transparent; color: inherit; padding: 0; }
    article table { border-collapse: collapse; width: 100%; }
    article th, article td { border: 1px solid var(--line); padding: 8px 10px; }
    article blockquote { border-left: 4px solid var(--accent); margin: 16px 0; padding-left: 16px; color: var(--muted); }

    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      aside {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      nav { display: grid; grid-template-columns: 1fr; }
      main { padding: 18px; }
      .paper { min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1 class="brand">Knowledge Base Docs</h1>
      <p class="subtitle">Operational notes for scraping, database buildout, AI retrieval, and the human web app.</p>
      <nav id="docNav" aria-label="Documentation files"></nav>
    </aside>
    <main>
      <section class="paper">
        <article id="content"><p class="status">Loading documentation...</p></article>
      </section>
    </main>
  </div>

  <script>
    const docs = [
      { file: "scrape-util-scripts.md", title: "Scrape Utility Scripts" },
      { file: "database-architecture.md", title: "Database Architecture" },
      { file: "frontend-human-usage.md", title: "Frontend For Humans" },
      { file: "cli-ai-database.md", title: "CLI For AI Database" }
    ];

    const md = window.markdownit({ html: false, linkify: true, typographer: true });
    const nav = document.getElementById("docNav");
    const content = document.getElementById("content");

    function currentFile() {
      const fromHash = decodeURIComponent(location.hash.replace(/^#/, ""));
      return docs.some(doc => doc.file === fromHash) ? fromHash : docs[0].file;
    }

    function setActive(file) {
      for (const button of nav.querySelectorAll("button")) {
        button.classList.toggle("active", button.dataset.file === file);
      }
    }

    async function loadDoc(file) {
      setActive(file);
      content.innerHTML = '<p class="status">Loading documentation...</p>';
      try {
        const response = await fetch(file, { cache: "no-store" });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const text = await response.text();
        content.innerHTML = md.render(text);
      } catch (error) {
        content.innerHTML = md.render(`# Could not load ${file}\n\n${String(error)}\n\nServe this folder over HTTP so the browser can fetch local Markdown files:\n\n\`\`\`pwsh\ncd doc\npython -m http.server 8080\n\`\`\`\n\nThen open http://127.0.0.1:8080/`);
      }
    }

    for (const doc of docs) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "doc-link";
      button.dataset.file = doc.file;
      button.textContent = doc.title;
      button.addEventListener("click", () => {
        location.hash = encodeURIComponent(doc.file);
      });
      nav.appendChild(button);
    }

    window.addEventListener("hashchange", () => loadDoc(currentFile()));
    loadDoc(currentFile());
  </script>
</body>
</html>
