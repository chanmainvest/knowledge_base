services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-kb}
    ports:
      - "${POSTGRES_PORT:-5544}:5432"
    volumes:
      - kb_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb} -d ${POSTGRES_DB:-kb}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  kb_pgdata:
